name: Build

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "manifest.json"
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore
        run: dotnet restore SonnyTel.Plugins.sln

      - name: Build
        run: dotnet build SonnyTel.Plugins.sln --configuration Release --no-restore

      - name: Verify embedded resources
        run: |
          backdrop_dll="SonnyTel.Plugin.BackdropExtended/bin/Release/net9.0/SonnyTel.Plugin.BackdropExtended.dll"
          if ! strings "$backdrop_dll" | grep -q "backdropExtended.js"; then
            echo "::error::backdropExtended.js not embedded in BackdropExtended DLL"
            exit 1
          fi
          echo "BackdropExtended embedded resources verified."

          music_dll="SonnyTel.Plugin.MusicPlayerFixes/bin/Release/net9.0/SonnyTel.Plugin.MusicPlayerFixes.dll"
          if ! strings "$music_dll" | grep -q "musicPlayerFixes.js"; then
            echo "::error::musicPlayerFixes.js not embedded in MusicPlayerFixes DLL"
            exit 1
          fi
          echo "MusicPlayerFixes embedded resources verified."
