name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Parse version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          # Normalize to four-part version
          IFS='.' read -ra PARTS <<< "$TAG"
          MAJOR="${PARTS[0]:-0}"
          MINOR="${PARTS[1]:-0}"
          BUILD="${PARTS[2]:-0}"
          REV="${PARTS[3]:-0}"
          VERSION="${MAJOR}.${MINOR}.${BUILD}.${REV}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Parsed version: ${VERSION}"

      - name: Update meta.json versions
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TIMESTAMP="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          for META in SonnyTel.Plugin.*/meta.json; do
            jq --arg v "$VERSION" --arg t "$TIMESTAMP" \
              '.version = $v | .timestamp = $t' \
              "$META" > meta_tmp.json
            mv meta_tmp.json "$META"
            echo "Updated $META to ${VERSION}"
          done

      - name: Build
        run: dotnet build SonnyTel.Plugins.sln --configuration Release /p:Version=${{ steps.version.outputs.version }} /p:AssemblyVersion=${{ steps.version.outputs.version }} /p:FileVersion=${{ steps.version.outputs.version }}

      # ── Backdrop Extended ──
      - name: Package Backdrop Extended
        id: pkg_backdrop
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ARTIFACT_NAME="backdrop-extended_${VERSION}.zip"
          OUT_DIR="SonnyTel.Plugin.BackdropExtended/bin/Release/net9.0"

          zip -j "${ARTIFACT_NAME}" \
            "${OUT_DIR}/SonnyTel.Plugin.BackdropExtended.dll" \
            "${OUT_DIR}/meta.json"

          MD5=$(md5sum "$ARTIFACT_NAME" | awk '{print $1}')

          echo "artifact=${ARTIFACT_NAME}" >> "$GITHUB_OUTPUT"
          echo "md5=${MD5}" >> "$GITHUB_OUTPUT"
          echo "Packaged: ${ARTIFACT_NAME} (${MD5})"

      # ── Music Player Fixes ──
      - name: Package Music Player Fixes
        id: pkg_music
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ARTIFACT_NAME="music-player-fixes_${VERSION}.zip"
          OUT_DIR="SonnyTel.Plugin.MusicPlayerFixes/bin/Release/net9.0"

          zip -j "${ARTIFACT_NAME}" \
            "${OUT_DIR}/SonnyTel.Plugin.MusicPlayerFixes.dll" \
            "${OUT_DIR}/meta.json"

          MD5=$(md5sum "$ARTIFACT_NAME" | awk '{print $1}')

          echo "artifact=${ARTIFACT_NAME}" >> "$GITHUB_OUTPUT"
          echo "md5=${MD5}" >> "$GITHUB_OUTPUT"
          echo "Packaged: ${ARTIFACT_NAME} (${MD5})"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.pkg_backdrop.outputs.artifact }}
            ${{ steps.pkg_music.outputs.artifact }}
          generate_release_notes: true

      - name: Update manifest.json
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"
          TIMESTAMP="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          BACKDROP_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/v${TAG}/${{ steps.pkg_backdrop.outputs.artifact }}"
          BACKDROP_MD5="${{ steps.pkg_backdrop.outputs.md5 }}"

          MUSIC_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/v${TAG}/${{ steps.pkg_music.outputs.artifact }}"
          MUSIC_MD5="${{ steps.pkg_music.outputs.md5 }}"

          # Update Backdrop Extended (guid: 3c8f4c97-...)
          jq --arg v "$VERSION" \
             --arg cl "See release notes" \
             --arg abi "10.11.0.0" \
             --arg url "$BACKDROP_URL" \
             --arg cs "$BACKDROP_MD5" \
             --arg ts "$TIMESTAMP" \
             --arg guid "3c8f4c97-2bc5-4e68-a60c-4e3b4a24c4b0" \
            'map(if .guid == $guid then
              .versions = [
                {
                  "version": $v,
                  "changelog": $cl,
                  "targetAbi": $abi,
                  "sourceUrl": $url,
                  "checksum": $cs,
                  "timestamp": $ts
                }
              ] + [.versions[]? | select(.version != $v)]
            else . end)' \
            manifest.json > manifest_tmp.json
          mv manifest_tmp.json manifest.json

          # Update Music Player Fixes (guid: a5d1e2f3-...)
          jq --arg v "$VERSION" \
             --arg cl "See release notes" \
             --arg abi "10.11.0.0" \
             --arg url "$MUSIC_URL" \
             --arg cs "$MUSIC_MD5" \
             --arg ts "$TIMESTAMP" \
             --arg guid "a5d1e2f3-b4c6-4d7e-8f9a-0b1c2d3e4f5a" \
            'map(if .guid == $guid then
              .versions = [
                {
                  "version": $v,
                  "changelog": $cl,
                  "targetAbi": $abi,
                  "sourceUrl": $url,
                  "checksum": $cs,
                  "timestamp": $ts
                }
              ] + [.versions[]? | select(.version != $v)]
            else . end)' \
            manifest.json > manifest_tmp.json
          mv manifest_tmp.json manifest.json

      - name: Commit updated manifest.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          cp manifest.json manifest.json.updated
          git restore manifest.json
          mv manifest.json.updated manifest.json
          git add manifest.json
          git commit -m "Update manifest.json for v${{ steps.version.outputs.tag }}"
          git push origin main
